<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #000; }
    #gameContainer { display: flex; justify-content: center; align-items: center; height: 100vh; }

    /* Game Selector */
    #gameSelector {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #111;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000;
    }
    #gameSelector h1 { color: #666; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 24px; font-weight: 400; }
    .game-list { display: flex; flex-direction: column; gap: 8px; width: 320px; max-height: 60vh; overflow-y: auto; padding: 4px; }
    .game-card {
      background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
      padding: 16px 20px; cursor: pointer; transition: background 0.15s;
      display: flex; justify-content: space-between; align-items: center;
    }
    .game-card:hover { background: #222; border-color: #555; }
    .game-card .name { color: #ccc; font-size: 15px; }
    .game-card .play { color: #666; font-size: 13px; }
    .game-card:hover .play { color: #8c8; }
    .game-card .file { color: #555; font-size: 11px; margin-top: 2px; }
    .empty { color: #555; font-size: 14px; text-align: center; padding: 40px; }
  </style>
</head>
<body>
  <div id="gameSelector">
    <h1>Select a Game</h1>
    <div class="game-list" id="gameList">
      <div class="empty">Loading...</div>
    </div>
  </div>
  <div id="gameContainer"></div>

  <script>
    let SELECTED_WORLD = '';

    fetch('src/data/index.json')
      .then(r => r.json())
      .then(games => {
        const list = document.getElementById('gameList');
        if (!games || games.length === 0) {
          list.innerHTML = '<div class="empty">No games found in src/data/</div>';
          return;
        }
        list.innerHTML = games.map(g => `
          <div class="game-card" data-file="${g.file}">
            <div>
              <div class="name">${g.name}</div>
              <div class="file">${g.file}</div>
            </div>
            <div class="play">Play &rarr;</div>
          </div>
        `).join('');
        list.querySelectorAll('.game-card').forEach(el => {
          el.addEventListener('click', function() {
            startGame(this.dataset.file);
          });
        });
      })
      .catch(err => {
        document.getElementById('gameList').innerHTML =
          '<div class="empty">Could not load game list.<br><small>' + err.message + '</small></div>';
      });

    function startGame(file) {
      SELECTED_WORLD = file;
      document.getElementById('gameSelector').style.display = 'none';

      const s = document.createElement('script');
      s.src = 'framework/phaser.4.2.0.js';
      s.onload = () => {
        const scripts = [
          'src/components/CharacterMovement.js',
          'src/components/Inventory.js',
          'src/components/ActionMenu.js',
          'src/components/DialogUI.js',
          'src/components/TextPanel.js',
          'src/components/RoomManager.js',
          'src/scenes/BootScene.js',
          'src/scenes/GameScene.js',
          'src/main.js'
        ];
        function loadNext(idx) {
          if (idx >= scripts.length) return;
          const el = document.createElement('script');
          el.src = scripts[idx];
          el.onload = () => loadNext(idx + 1);
          document.body.appendChild(el);
        }
        loadNext(0);
      };
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
